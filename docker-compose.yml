
services:
  postgres:
    image: postgres:17-alpine
    container_name: hotel-booking-database-container
    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5454:5432"
    volumes:
      - hotel-postgres-data:/var/lib/postgresql/data

volumes:
  hotel-postgres-data:
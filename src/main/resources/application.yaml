spring:
  application:
    name: hotel
  datasource:
    url: jdbc:postgresql://localhost:5454/hotel_db
    driver-class-name: org.postgresql.Driver
    username: admin
    password: admin

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9001/realms/hotel-booking

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8081

